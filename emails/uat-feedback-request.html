<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <meta name="supported-color-schemes" content="light">
  <title>What did you think?</title>
  <style>
    :root { color-scheme: light only; }
    body, table, td, a { -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
    body { background-color:#0f0f1a !important; color:#e8e8f5 !important; }
    p, span, td, div, h1, h2, h3, strong { color:inherit !important; }
  </style>
</head>
<body style="margin:0 !important; padding:0 !important; background-color:#0f0f1a !important; font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f0f1a !important;">
    <tr>
      <td align="center" style="padding:40px 20px;">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background-color:#16213e !important; border-radius:16px; overflow:hidden;">

          <!-- Header -->
          <tr>
            <td align="center" style="padding:40px 40px 24px; background-color:#16213e !important;">
              <img src="{{logo_url}}" alt="EverMagic" width="144" style="display:block; margin:0 auto 20px; border:0;">
              <div style="font-size:40px; line-height:1; margin-bottom:8px;">💬</div>
              <h1 style="margin:12px 0 0; font-size:24px; font-weight:700; color:#ffffff !important; letter-spacing:-0.5px;">
                What did you think?
              </h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:0 40px 32px; background-color:#16213e !important;">
              <p style="margin:0 0 16px; font-size:16px; line-height:1.7; color:#e8e8f5 !important;">
                {{child_name}}'s files should be in your inbox now. I hope they landed well.
              </p>
              <p style="margin:0 0 24px; font-size:16px; line-height:1.7; color:#e8e8f5 !important;">
                When you get a moment — 5 questions, takes 2 minutes. Your honest take is what I actually need.
              </p>

              <!-- CTA button -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:28px;">
                <tr>
                  <td align="center">
                    <a href="{{feedback_url}}" style="display:inline-block; padding:16px 36px; background-color:#7c3aed; color:#ffffff !important; font-size:16px; font-weight:700; text-decoration:none; border-radius:10px; letter-spacing:0.3px;">
                      Share my feedback →
                    </a>
                  </td>
                </tr>
              </table>

              <p style="margin:0; font-size:13px; line-height:1.6; color:#8b8ba3 !important; text-align:center;">
                Goes straight to me. Not published anywhere.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding:20px 40px 32px; border-top:1px solid #2a3a5c; background-color:#16213e !important;">
              <p style="margin:0; font-size:13px; color:#8b8ba3 !important;">
                Made with ❤️ by <strong style="color:#b0b0cc !important;">EverMagic</strong> — Taras
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
